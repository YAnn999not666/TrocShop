    <script>
      console.log("Service Worker désactivé pour empêcher le crash sur AI Studio.");
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var i = 0; i < registrations.length; i++) {
            registrations[i].unregister().then(function(success) {
              if (success) {
                console.log("Service Worker nettoyé avec succès.");
              }
            });
          }
        }).catch(function(err) {
          console.log("Erreur lors du nettoyage du service worker:", err);
        });
      }
    </script>
