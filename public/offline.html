<!DOCTYPE html>
<html lang="fr text-zinc-900 bg-zinc-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrocShop - Hors-ligne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/jpeg" href="/icon.jpg" />
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 text-center font-sans">
    <div class="w-20 h-20 bg-orange-100 rounded-3xl flex items-center justify-center mb-8 shadow-lg shadow-orange-100">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#EA580C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path><path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
    </div>
    <h1 class="text-3xl font-black uppercase tracking-tighter italic mb-4">Oups ! Vous êtes hors-ligne.</h1>
    <p class="text-zinc-500 max-w-xs mb-8 font-medium">TrocShop nécessite une connexion internet pour synchroniser vos échanges et annonces.</p>
    <button onclick="window.location.reload()" class="px-8 py-4 bg-orange-600 text-white rounded-full font-black uppercase tracking-widest shadow-xl shadow-orange-600/20 active:scale-95 transition-all">
        Réessayer
    </button>
</body>
</html>
